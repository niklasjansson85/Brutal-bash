<script>
  const params = new URLSearchParams(window.location.search);
  const card = params.get("card");

  const img = document.getElementById("cardImage");

  if (card && img) {

    // ✅ sätt bilden (cache-safe)
    img.src = "images/" + card + ".jpg?ts=" + Date.now();

    // ✅ säker glitch-start efter render
    setTimeout(() => {
      if (Math.random() < 0.4) {
        img.classList.add("glitch");
      } else {
        img.classList.remove("glitch");
      }
    }, 150);

  } else {
    document.body.innerHTML = "<h1>Inget kort valt</h1>";
  }
</script>
