<script>
  const params = new URLSearchParams(window.location.search);
  const card = params.get("card");
  const type = params.get("type");

  const img = document.getElementById("cardImage");

  if (card) {

    // ✅ välj mapp
    let folder = "images";

    if (type === "vapen") {
      folder = "vapen";
    }

    // ✅ försök ladda vald bild
    img.src = folder + "/" + card + ".jpg?ts=" + Date.now();

    // ✅ FALLBACK – om något går fel
    img.onerror = () => {
      img.src = "images/" + card + ".jpg?ts=" + Date.now();
    };

    // ✅ glitch efter load
    img.onload = () => {
      if (Math.random() < 0.4) {
        img.classList.add("glitch");
      } else {
        img.classList.remove("glitch");
      }
    };

  } else {
    document.body.innerHTML = "<h1>Inget kort valt</h1>";
  }
</script>
