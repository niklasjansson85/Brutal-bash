<!DOCTYPE html>
<html>
<head>
  <title>Brutalbash</title>
  <style>
    .glitch {
  position: relative;
  animation: glitchAnim 0.5s infinite;
}

@keyframes glitchAnim {
  0% { transform: translate(0); }
  20% { transform: translate(-2px, 2px); }
  40% { transform: translate(-2px, -2px); }
  60% { transform: translate(2px, 2px); }
  80% { transform: translate(2px, -2px); }
  100% { transform: translate(0); }
}

.glitch::before,
.glitch::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

.glitch::before {
  background: red;
  opacity: 0.2;
  transform: translate(-2px, 0);
}

.glitch::after {
  background: blue;
  opacity: 0.2;
  transform: translate(2px, 0);
}
``
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    img {
      width: 90%;
      max-width: 400px;
      border-radius: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>Brutalbash</h1>
<img id="cardImage" class="glitch">


<script>
  const params = new URLSearchParams(window.location.search);
  const card = params.get("card");

  if(card){
    document.getElementById("cardImage").src = "images/" + card + ".jpg";
  } else {
    document.body.innerHTML = "<h1>Inget kort valt</h1>";
  }
</script>

</body>
</html>
