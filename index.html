<script>
  const img = document.getElementById("cardImage");

  const params = new URLSearchParams(window.location.search);
  const card = params.get("card");
  const type = params.get("type");
  const rarity = params.get("rarity");

  // ✅ ALLTID visa fallback direkt
  img.src = "images/1.jpg";

  if (card) {

    let folder = "images";

    // ✅ välj mapp
    if (type) {
      if (rarity) {
        folder = type + "/" + rarity;
      } else {
        folder = type;
      }
    }

    let path = folder + "/" + card + ".jpg";

    // ✅ försök visa rätt bild
    img.src = path;

    // ✅ fallback så sidan ALDRIG blir vit
    img.onerror = () => {
      img.src = "images/1.jpg";
    };

    // ✅ visa text (säkert sätt)
    let info = "";

    if (type) {
      info += "<h2>" + type.toUpperCase() + "</h2>";
    }

    if (rarity) {
      info += "<h3>" + rarity.toUpperCase() + "</h3>";
    }

    if (card == "1") {
      info += "<p>⚔️ Svärd</p><p>Attack +10</p>";
    }

    if (card == "2") {
      info += "<p>🛡️ Sköld</p><p>Defense +15</p>";
    }

    if (card == "3") {
      info += "<p>🔥 Eldsvärd</p><p>Attack +25</p>";
    }

    // ✅ lägg till text på slutet (säkert!)
    document.body.innerHTML += info;

  }
</script>
