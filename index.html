<script>
  const params = new URLSearchParams(window.location.search);
  const card = params.get("card");
  const type = params.get("type"); // 👈 NY

  const img = document.getElementById("cardImage");

  if (card) {

    // 👇 välj mapp (images eller vapen)
    let folder = "images";

    if (type == "vapen") {
      folder = "vapen";
    }

    // ✅ visa bild
    img.src = folder + "/" + card + ".jpg?ts=" + Date.now();

    img.onload = () => {
      // ✅ glitch ibland
      if (Math.random() < 0.4) {
        img.classList.add("glitch");
      } else {
        img.classList.remove("glitch");
      }
    };

  } else {
    document.body.innerHTML = "<h1>Inget kort valt</h1>";
  }
</script>
