<script>
  const params = new URLSearchParams(window.location.search);
  const card = params.get("card");
  const type = params.get("type");

  const img = document.getElementById("cardImage");

  if (!card) {
    // ✅ fallback om card saknas
    img.src = "images/1.jpg";
  } else {

    // ✅ välj mapp
    let folder = "images";
    if (type === "vapen") {
      folder = "vapen";
    }

    // ✅ försök ladda vald bild
    let mainSrc = folder + "/" + card + ".jpg?ts=" + Date.now();

    // ✅ fallback (ALLTID fungerande)
    let fallbackSrc = "images/" + card + ".jpg?ts=" + Date.now();

    // ✅ sätt bild med fallback direkt
    img.src = mainSrc;

    // ✅ om första misslyckas → fallback
    img.onerror = () => {
      img.onerror = null; // stoppa loop
      img.src = fallbackSrc;
    };

    // ✅ när bild laddats
    img.onload = () => {
      if (Math.random() < 0.4) {
        img.classList.add("glitch");
      } else {
        img.classList.remove("glitch");
      }
    };
  }
</script>
