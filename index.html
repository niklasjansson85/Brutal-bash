<!DOCTYPE html>
<html>
<head>
  <title>Brutalbash</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    img {
      width: 90%;
      max-width: 400px;
      border-radius: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>Brutalbash</h1>
<img id="cardImage">

<script>
  const params = new URLSearchParams(window.location.search);
  const card = params.get("card");

  if(card){
    document.getElementById("cardImage").src = "images/" + card + ".jpg";
  } else {
    document.body.innerHTML = "<h1>Inget kort valt</h1>";
  }
</script>

</body>
</html>
