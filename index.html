<script>
  const params = new URLSearchParams(window.location.search);
  const card = params.get("card");
  const type = params.get("type");

  const img = document.getElementById("cardImage");

  // ✅ om card saknas → visa standardbild
  if (!card) {
    img.src = "images/1.jpg";
  } else {

    // ✅ välj mapp
    let folder = "images";
    if (type === "vapen") {
      folder = "vapen";
    }

    // ✅ skapa URL
    let mainSrc = folder + "/" + card + ".jpg?ts=" + Date.now();
    let fallbackSrc = "images/" + card + ".jpg?ts=" + Date.now();

    // ✅ sätt bild
    img.src = mainSrc;

    // ✅ fallback om något går fel
    img.onerror = () => {
      img.onerror = null;
      img.src = fallbackSrc;
    };

    // ✅ glitch ibland
    img.onload = () => {
      if (Math.random() < 0.4) {
        img.classList.add("glitch");
      } else {
        img.classList.remove("glitch");
      }
    };
  }
</script>
