<script>
  const img = document.getElementById("cardImage");

  const params = new URLSearchParams(window.location.search);
  const card = params.get("card");
  const type = params.get("type");
  const rarity = params.get("rarity");
  const sub = params.get("sub"); // ✅ ny nivå

  // ✅ fallback
  img.src = "images/1.jpg";

  if (card) {

    let folder = "images";

    if (type) {

      folder = type;

      if (rarity) {
        folder += "/" + rarity;
      }

      if (sub) {
        folder += "/" + sub;
      }
    }

    // ✅ OBS: här använder vi FILNAMN nu (inte bara 1.jpg)
    let path = folder + "/" + card;

    // ✅ testa bild
    let testImg = new Image();

    testImg.onload = function () {
      img.src = path;
    };

    testImg.onerror = function () {
      img.src = "images/1.jpg";
    };

    testImg.src = path;

    // ✅ enkel text
    document.body.innerHTML += "<p>Kort: " + card + "</p>";

    if (type) {
      document.body.innerHTML += "<p>Typ: " + type + "</p>";
    }

    if (rarity) {
      document.body.innerHTML += "<p>Rarity: " + rarity + "</p>";
    }

    if (sub) {
      document.body.innerHTML += "<p>Sub: " + sub + "</p>";
    }
  }
</script>
``
