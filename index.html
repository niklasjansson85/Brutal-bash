<!DOCTYPE html>
<html>
<head>
  <title>Brutalbash</title>

  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    img {
      width: 90%;
      max-width: 400px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>Brutalbash</h1>

<img id="cardImage" src="images/1.jpg">

<script>
  const img = document.getElementById("cardImage");

  const params = new URLSearchParams(window.location.search);
  const card = params.get("card");
  const type = params.get("type");
  const rarity = params.get("rarity");

  // ✅ ALLTID börja med fallback
  img.src = "images/1.jpg";

  if (card) {

    let folder = "images";

    // ✅ välj rätt mapp
    if (type) {
      if (rarity) {
        folder = type + "/" + rarity;
      } else {
        folder = type;
      }
    }

    let path = folder + "/" + card + ".jpg";

    // ✅ TESTA först bilden innan vi visar den
    let testImg = new Image();

    testImg.onload = function () {
      // ✅ om bilden finns → visa den
      img.src = path;
    };

    testImg.onerror = function () {
      // ✅ om den inte finns → behåll fallback
      img.src = "images/1.jpg";
    };

    testImg.src = path;

    // ✅ enkel text (så du ser att kort byts)
    document.body.innerHTML += "<p>Kort: " + card + "</p>";

    if (type) {
      document.body.innerHTML += "<p>Typ: " + type + "</p>";
    }

    if (rarity) {
      document.body.innerHTML += "<p>Rarity: " + rarity + "</p>";
    }
  }
</script>

</body>
</html>
