<script>
  const img = document.getElementById("cardImage");

  // ✅ ALLTID visa denna först
  img.src = "images/1.jpg";

  const params = new URLSearchParams(window.location.search);
  const card = params.get("card");
  const type = params.get("type");

  if (card) {

    let folder = "images";

    if (type === "vapen") {
      folder = "vapen";
    }

    let newSrc = folder + "/" + card + ".jpg";

    // ✅ Försök ladda ny bild efter lite delay
    setTimeout(() => {
      img.src = newSrc;
    }, 200);

  }
</script>
