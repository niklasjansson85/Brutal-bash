<!DOCTYPE html>
<html>
<head>
  <title>Brutalbash</title>

  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    img {
      width: 90%;
      max-width: 400px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>Brutalbash</h1>

<img id="cardImage" src="images/1.jpg">

<script>
  const img = document.getElementById("cardImage");

  const params = new URLSearchParams(window.location.search);
  const card = params.get("card");
  const type = params.get("type");
  const rarity = params.get("rarity");

  if (card) {

    let folder = "images";

    if (type === "vapen") {
      folder = "vapen";
    }

    let path = folder + "/" + card + ".jpg";

    img.src = path;
  }
</script>

</body>
</html>
